name: Snake Animation

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: DireDoch
          outputs: |
            assets/snake.svg?color_snake=#F0B96C&color_dots=#2F1B12,#5C3318,#8B5020,#C47030,#D28A44

      - name: Commit snake SVG
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "chore: update snake animation [skip ci]"
          add: "assets/snake.svg"
