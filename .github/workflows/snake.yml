# Snake is now generated by stats.yml via source/module/snake_generator.py
# This file is kept as a manual fallback trigger only.

name: Snake (manual fallback)

on:
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .

      - name: Generate snake only
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          source .venv/bin/activate
          python - <<'EOF'
import sys
sys.path.insert(0, "source")
from module.snake_generator import build_and_save
build_and_save("assets/snake.svg")
EOF

      - name: Commit
        run: |
          git config user.name "Anthony Boily"
          git config user.email "143445670+DireDoch@users.noreply.github.com"
          git add assets/snake.svg
          git diff --staged --quiet || git commit -m "chore: regenerate snake [skip ci]"
          git push
