name: Update Profile Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .

      - name: Run stats updater
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          source .venv/bin/activate
          cd source
          python main.py

      - name: Commit updated SVG
        run: |
          git config user.name "Stats Bot"
          git config user.email "bot@users.noreply.github.com"
          git add resources/profile.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats [skip ci]"
          git push
