<g class="ascii-art" font-size="11px" fill="#6B3D18">
  <text x="448" y="62">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЎ в ҙв ’в ’в Ів Өв ӨвЈҖвЎҖв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="448" y="80">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҙв Ӣв Җв Җв Җв Җв  вўҡвЈӮвЎҖв Ҳв ІвЈ„в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҖвЈҖвЎҖв Җв Җ</text>
  <text x="448" y="98">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҺвЎҙв Ҷв Җв Җв Җв Җв ҖвўҺв җвўҹвЎҮв Җв ҲвўЈвЈ в һв үв үв ‘вў„в Җв ҖвЈ°в ӢвЎҜв —вЈҡвЈүвЈ“вЎ„</text>
  <text x="448" y="116">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈёвў вўһв үвЎҶв Җв Җв Җв Җв Җв “в Ӣв Җв Җв Җв Җвўҝв Җв Җв Җв Җв Ҳвў§в Җвў№вЈ в •в ҳвў§в Җв Җв Җ</text>
  <text x="448" y="134">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҮв ҳв ®в ”в Ғв Җв Җв Җв ҖвўҖв Җв Җв Җв Җв Җв Җв ёвЎҖв Җв Җв Җв Җв ҲвЈҮв Җвўів Җв Җв ҳвЎҶв Җв Җ</text>
  <text x="448" y="152">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҙв Ӣв үв “в ҰвЈ§в Җв Җв Җв ҖвўҰв Өв Өв –в Ӣв Үв Җв Җв Җв Җв Җв ҖвЎҮв Җв Җв Җв Җв Җв ёвЎ„в ҲвЎҮв Җв Җвў№вЎҖв Җ</text>
  <text x="448" y="170">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв Ғв Җв Җв Җв Җв ҷвЎҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҮв Җв ҲвЈҶв Җв Җв Җвўұв ҖвЎҮв Җв Җв ҖвЎҮв Җ</text>
  <text x="448" y="188">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈјв Җв Җв Җв Җв Җв Җв ҳвўҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎ°в Ғв Җв Җв ёвЎ„в Җв Җв Җв ів ғв Җв Җв ҖвЎҮв Җ</text>
