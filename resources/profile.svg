<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',Courier,monospace" width="100%" viewBox="0 0 800 560" font-size="14px">
<defs>
  <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect width="800" height="1" y="0" fill="#000000" opacity="0.12"/>
  </pattern>
</defs>
<style>
  text, tspan { white-space: pre; }
  .main  { fill: #F0C080; }
  .key   { fill: #D28A44; }
  .value { fill: #E8B86D; }
  .cc    { fill: #5C3318; }
  .art   { fill: #6B3D18; }

  @keyframes glitch-reveal {
    0%   { opacity: 0; transform: translate(-5px, 0); }
    15%  { opacity: 0.5; transform: translate(5px, 0); }
    30%  { opacity: 0.2; transform: translate(-4px, 1px); }
    45%  { opacity: 0.7; transform: translate(4px, -1px); }
    60%  { opacity: 0.4; transform: translate(-3px, 0); }
    75%  { opacity: 0.85; transform: translate(2px, 1px); }
    90%  { opacity: 0.95; transform: translate(-1px, 0); }
    100% { opacity: 1; transform: translate(0, 0); }
  }

  .ascii-art {
    animation: glitch-reveal 0.7s ease-out 0.7s both;
  }
</style>

<!-- Background -->
<rect width="800" height="560" fill="#2F1B12" rx="10"/>

<!-- Title bar -->
<rect width="800" height="30" fill="#1A0D07" rx="10"/>
<rect y="15" width="800" height="15" fill="#1A0D07"/>

<!-- Title bar dots -->
<circle cx="16" cy="15" r="5" fill="#3D1F0F"/>
<circle cx="32" cy="15" r="5" fill="#4A2510"/>
<circle cx="48" cy="15" r="5" fill="#3D1F0F"/>

<!-- Separator -->
<line x1="0" y1="30" x2="800" y2="30" stroke="#3D2010" stroke-width="1"/>

<!-- Title text -->
<text x="400" y="21" text-anchor="middle" fill="#7A4520" font-size="12px">archony@cachyos ~ $</text>

