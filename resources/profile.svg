<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',Courier,monospace" width="100%" viewBox="0 0 800 700" font-size="14px">
<defs>
  <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect width="800" height="1" y="0" fill="#000000" opacity="0.12"/>
  </pattern>

  <!-- ponytail: phosphor glow вҖ” soft amber halo on the foreground text -->
  <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="0.9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- ponytail: CRT curvature faked with a vignette; real barrel distortion needs
       feDisplacementMap, skipped as fragile in GitHub's img-SVG renderer -->
  <radialGradient id="vignette" cx="50%" cy="44%" r="72%">
    <stop offset="52%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>

  <!-- typing wipes: reveal each command line left-to-right = looks typed -->
  <clipPath id="type1"><rect x="15" y="37" width="0" height="22"><animate attributeName="width" values="0;235" begin="0.3s" dur="0.5s" fill="freeze"/></rect></clipPath>
  <clipPath id="type2"><rect x="15" y="387" width="0" height="22"><animate attributeName="width" values="0;350" begin="2.9s" dur="0.5s" fill="freeze"/></rect></clipPath>
  <clipPath id="type3"><rect x="15" y="477" width="0" height="22"><animate attributeName="width" values="0;270" begin="4.0s" dur="0.4s" fill="freeze"/></rect></clipPath>
</defs>
<style>
  text, tspan { white-space: pre; }
  .main  { fill: #F0C080; }
  .key   { fill: #D28A44; }
  .value { fill: #E8B86D; }
  .cc    { fill: #5C3318; }

  @keyframes glitch-reveal {
    0%   { opacity: 0; transform: translate(-5px, 0); }
    15%  { opacity: 0.5; transform: translate(5px, 0); }
    30%  { opacity: 0.2; transform: translate(-4px, 1px); }
    45%  { opacity: 0.7; transform: translate(4px, -1px); }
    60%  { opacity: 0.4; transform: translate(-3px, 0); }
    75%  { opacity: 0.85; transform: translate(2px, 1px); }
    90%  { opacity: 0.95; transform: translate(-1px, 0); }
    100% { opacity: 1; transform: translate(0, 0); }
  }
  /* both ASCII arts glitch into the background together, at the `cat ~/.art` moment */
  .art-final { animation: glitch-reveal 0.7s ease-out 4.4s both; }
</style>

<!-- Background -->
<rect width="800" height="700" fill="#2F1B12" rx="10"/>

<!-- Title bar -->
<rect width="800" height="30" fill="#1A0D07" rx="10"/>
<rect y="15" width="800" height="15" fill="#1A0D07"/>
<circle cx="16" cy="15" r="5" fill="#3D1F0F"/>
<circle cx="32" cy="15" r="5" fill="#4A2510"/>
<circle cx="48" cy="15" r="5" fill="#3D1F0F"/>
<line x1="0" y1="30" x2="800" y2="30" stroke="#3D2010" stroke-width="1"/>
<text x="400" y="21" text-anchor="middle" fill="#7A4520" font-size="12px">archony@cachyos ~ $</text>

<!-- в•җв•җв•җ BACKGROUND ASCII ART 1 (bear) вҖ” faint watermark, revealed at cat ~/.art в•җв•җв•җ -->
<g class="art-final" font-size="11px" fill="#6B3D18">
  <text x="455" y="60">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЎ в ҙв ’в ’в Ів Өв ӨвЈҖвЎҖв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="78">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҙв Ӣв Җв Җв Җв Җв  вўҡвЈӮвЎҖв Ҳв ІвЈ„в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҖвЈҖвЎҖв Җв Җ</text>
  <text x="455" y="96">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҺвЎҙв Ҷв Җв Җв Җв Җв ҖвўҺв җвўҹвЎҮв Җв ҲвўЈвЈ в һв үв үв ‘вў„в Җв ҖвЈ°в ӢвЎҜв —вЈҡвЈүвЈ“вЎ„</text>
  <text x="455" y="114">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈёвў вўһв үвЎҶв Җв Җв Җв Җв Җв “в Ӣв Җв Җв Җв Җвўҝв Җв Җв Җв Җв Ҳвў§в Җвў№вЈ в •в ҳвў§в Җв Җв Җ</text>
  <text x="455" y="132">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҮв ҳв ®в ”в Ғв Җв Җв Җв ҖвўҖв Җв Җв Җв Җв Җв Җв ёвЎҖв Җв Җв Җв Җв ҲвЈҮв Җвўів Җв Җв ҳвЎҶв Җв Җ</text>
  <text x="455" y="150">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҙв Ӣв үв “в ҰвЈ§в Җв Җв Җв ҖвўҰв Өв Өв –в Ӣв Үв Җв Җв Җв Җв Җв ҖвЎҮв Җв Җв Җв Җв Җв ёвЎ„в ҲвЎҮв Җв Җвў№вЎҖв Җ</text>
  <text x="455" y="168">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв Ғв Җв Җв Җв Җв ҷвЎҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҮв Җв ҲвЈҶв Җв Җв Җвўұв ҖвЎҮв Җв Җв ҖвЎҮв Җ</text>
  <text x="455" y="186">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈјв Җв Җв Җв Җв Җв Җв ҳвўҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎ°в Ғв Җв Җв ёвЎ„в Җв Җв Җв ів ғв Җв Җв ҖвЎҮв Җ</text>
  <text x="455" y="204">в Җв Җв Җв Җв Җвў вўҸв үвўівЎҖв Җв Җвў№в Җв Җв Җв Җвў в Җв Җв Җв ‘в ӨвЈ„вЈҖвЎҖв Җв Җв Җв Җв ҖвЈҖвЎӨв ҡв Җв Җв Җв Җв ҖвўёвўўвЎҖв Җв Җв Җв Җв Җвў°в Ғв Җ</text>
  <text x="455" y="222">в Җв ҖвЈҖвЈӨвЎһв “в үв Ғв Җвўів Җв Җвўёв Җв Җв Җв ҖвўёвЎҶв Җв Җв Җв Җв Җв Җв үв үв үв үв үв үв Ғв Җв Җв Җв Җв Җв Җв Җвўёв Җв ҷв ҰвЈӨвЈҖвЈҖвЎӨв ғв Җв Җ</text>
  <text x="455" y="240">в ҖвЈ°в —в ’вЈҡв ҖвўҖвЎӨв ҡв үвўів Җв ҲвЎҮв Җв Җв ҖвўёвЎ§в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="258">в ёв өвЎҫв Ӣв үв үвЎҸв Җв Җв Җв Ҳв ЈвЈҖвЈів Җв Җв ҖвўёвЎҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="276">в Җв Җв Җв Җв Җв Җв №вЎ„в Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎјвЎҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈёв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="294">в Җв Җв Җв Җв Җв Җв Җв івЎ„в Җв Җв Җв Җв Җв Җв ҖвЎ°в ҒвЎҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="312">в Җв Җв Җв Җв Җв Җв Җв Җв Ҳв “в Ів Өв Өв Өв ҙв ҡв Ғв ҖвЎҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="455" y="330">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Үв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҳв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
</g>

<!-- в•җв•җв•җ BACKGROUND ASCII ART 2 (new) вҖ” faint watermark, revealed together with art 1 в•җв•җв•җ -->
<g class="art-final" font-size="11px" fill="#6B3D18">
  <text x="565" y="372">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҖвЎҖв Җв Җв Җв Җв Җв „в Җв Җв Җ</text>
  <text x="565" y="386">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҳвЎҹв Үв Җв Җв Җв Җвў»вЎ„в Җв Җв Җ</text>
  <text x="565" y="400">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЎҮв Җв Җв Җв ҖвЎёвЈһвЎҮв Җв Җв Җ</text>
  <text x="565" y="414">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв ғв Җв Җв ҖвўҖвЈ§вўҝвЈҪвЎҖв Җв Җ</text>
  <text x="565" y="428">в ҖвўҙвЈҝв Ҷв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв Җв Җв Җв ҖвЈјвЈһвЎҝвЎһвЎҒв Җв Җ</text>
  <text x="565" y="442">в Җв Җв Ҳв “вўӨвЎҖв Җв Җв ҖвЎҖв Җв Җв Җв Җв Җв Җв ҖвЈҫв Җв Җв ҖвЈ°вЈҹвўҫвЈҪвўғвЎҝв Җв Җ</text>
  <text x="565" y="456">в Җв Җв Җв Җв Җв ҷвўҶвЎҖв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҝвЈ вўӨвЈ¶вЎ»вЈһвЈҝвЈәв ҮвЈҪвўЈв Җ</text>
  <text x="565" y="470">вў вЈ„вЎҖв Җв Җв Җв Җв ҷвўҰвЎҖв Җв Җв Җв ҖвЈҖвЈ вЈӨвЈҝвЈҪвЈ»вўҫвЈҪвЈ·вЈҫвЈҪв ғвўҶвЎҮв Җ</text>
  <text x="565" y="484">в Ҳвў»вЈҝвЈ¶вЈ„вЎҖв Җв Җв ҖвЈүвЈівЈҙвў¶вЈһвЎҝвЈҪвЈһвЎ·вЈҜвўҝвЎҪвЈһвЈҝв ҹв Ӣв Ғв Ҳв Җв Җ</text>
  <text x="565" y="498">в Җв Җвў»вЈҝвЈҝвЈҝвЈҝвЈ¶вЈҫвЈҝвЎҪвЈҜвЈҹвЎҫвЈҪвЎ·вЈҜвЈҹвЎҪвЎҫвЈҪвЎҜв Ғв Җв Җв Җв Җв Җв Җ</text>
  <text x="565" y="512">в Җв Җв үвўһвЈҝвЈҝвўҜвЎҝвЈҝвЈҜвЈҹвЈ·вЈҜвўҝвЈівЈҹвЎ·вЈҪвЈјвЈ»вЈҪв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="565" y="526">в Җв Җв ҖвўҫвЈҝвЈҝвЈҜвЈҪвЈҫвЈҝвЈҫвЈ—вЎҝвЈҜвЎ·вЈҜвЈҹвЎ·вЈһвЈјвЈҝвЈҖв Җв Җв Җв ҖвўҖвЈ в Җ</text>
  <text x="565" y="540">в Җв ҖвўҖвЈјв ӣв Ҹв үв үв ҪвўҹвўҝвЈҝвЈҝвЈҝвЈҝвЈ·вЈ»вўҫвЎҪвЈһвЎ·в „вЎ№вЈ¶в ҹвЈ»вўҝвЎғв Җ</text>
  <text x="565" y="554">в Җв ҖвЈёвЈҜв Үв Җв Җв Җв Җв Җв ҒвЈҪвЈҝвЈҝвЈҝвЈ·вЈҜвЈҝвЈҪвЈӣвЎҰв Җв Җвў©в ЈвЈ№вўҜвЎҮв Җ</text>
  <text x="565" y="568">в Җв ҖвўҲвЈҝвЎғв Ғв Җв Җв ҖвўҖвЈ¬вЈҫвЈҹвўҝвЈ»вЈҝвЈҝвЈҹвЎҫвЈҪвЎів „в ҺвўівўҲвўҜвЈҹвЎҶв Җ</text>
  <text x="565" y="582">в Җв ҖвЈёвЈ·вЈ·вЈ¶вЈівЈ¶вЈәвЈҝвЈҝвЈ·вўҜвЈҹвЈҝвЈҝвЈівўҜв ӣв …в ғв Җв ҖвЈҙвўӘвЎҝвЈ¬в Ӯв Җ</text>
  <text x="565" y="596">в Җв ҖвўәвЎҪвЈҫвЎҪвЈҜвЈҹвЈҝвЎҝвЈҜвЈҝвЈҝвЈҫвўҝвЈҝв івўҸвЈҲвў в Җв ҖвЈ°вўҝвЎһвЈңвЈүв Җв Җ</text>
  <text x="565" y="610">в Җв Җв ҳвЈҪвЈівЈҹвЈівЈҹвЈҫвЈҪвЈҝвЈҝвЈҝвЈҝвЈҝвЈҰвЈңвЎ»вЎҪв Ҷв ғвЈҙвЎҹвЈҜв —вЎЈвЈӯв Җв Җ</text>
  <text x="565" y="624">в Җв Җв Җв №вЈҝвЈҫвЈҝвЈҜвЈҝвЈҫвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҫв §в Җв №в ҫвЎөвЎһв №вў в Җв Җ</text>
  <text x="565" y="638">в Җв Җв Җв җв №вўҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвўҜв Ҡв Җв Җв Җв Җв Җв Җв Җв Җв Җ</text>
  <text x="565" y="652">в Җв Җв Җв Җв ҖвЈҖв »вЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвўҜвЈҸвЎ°вЈ¶вЈөвЈўвў„вў вЎҖвЎ„в Җв Җ</text>
  <text x="565" y="666">в Җв ҖвЎҖв ”в үв Җв ҖвўҪвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈ”вЈ»вў·вЈҜвЎҪвЈҡвЈ·вЈ»вЎјв Җв Җ</text>
  <text x="565" y="680">в Җв Җв Җв Җв Җв Җв Җв ҳвўҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈҝвЈ·вЎҹвЈҪвЈһвЈ·вЈ»в Җв Җ</text>
