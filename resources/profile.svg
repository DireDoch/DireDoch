  <text x="448" y="224">в Җв ҖвЈҖвЈӨвЎһв “в үв Ғв Җвўів Җв Җвўёв Җв Җв Җв ҖвўёвЎҶв Җв Җв Җв Җв Җв Җв үв үв үв үв үв үв Ғв Җв Җв Җв Җв Җв Җв Җвўёв Җв ҷв ҰвЈӨвЈҖвЈҖвЎӨв ғв Җв Җ</text>
