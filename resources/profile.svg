<!-- Static scanlines -->
<rect width="800" height="700" fill="url(#scanlines)" rx="10"/>

<!-- ponytail: moving scanline sweep -->
<rect x="0" width="800" height="3" fill="#F0C080" opacity="0.08">
  <animate attributeName="y" values="-6;700" dur="4.5s" repeatCount="indefinite"/>
</rect>

<!-- ponytail: CRT flicker вҖ” subtle global brightness flutter -->
<rect width="800" height="700" fill="#2F1B12" rx="10" opacity="0">
  <animate attributeName="opacity" values="0;0.05;0;0.03;0;0.06;0" dur="0.22s" repeatCount="indefinite"/>
</rect>

<!-- Vignette (fakes CRT curvature) -->
<rect width="800" height="700" fill="url(#vignette)" rx="10"/>

</svg>
